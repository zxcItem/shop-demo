{extend name="tools/layout" /}

{block name="keywords"}颜色转换,HEX转RGB,RGB转HEX,颜色代码,在线配色,Web颜色{/block}
{block name="description"}在线颜色格式转换工具，支持HEX、RGB、RGBA等颜色格式的互相转换，并提供颜色预览和常用颜色表。{/block}

{block name="main"}
<div class="layui-card">
    <div class="layui-card-header">颜色格式转换</div>
    <div class="layui-card-body">
        
        <div class="layui-form-item" style="margin-bottom: 30px;">
            <div class="layui-inline" style="margin-bottom: 0;">
                <label class="layui-form-label" style="padding: 10px 0;">输入颜色</label>
                <div class="layui-input-inline" style="width: 250px; margin-right: 15px;">
                    <input type="text" id="color-input" placeholder="#00b894 或 rgb(0,184,148)" class="layui-input" style="font-family: 'JetBrains Mono', monospace; font-size: 15px;">
                </div>
            </div>
            <div class="layui-inline" style="margin-bottom: 0; position: relative;">
                <div id="color-preview" style="width: 44px; height: 44px; border-radius: 8px; background-color: #fff; border: 2px solid #e2e8f0; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.05);" title="点击选择颜色"></div>
                <input type="color" id="color-picker" style="opacity: 0; position: absolute; left: 0; top: 0; width: 44px; height: 44px; cursor: pointer;">
            </div>
            <div class="layui-inline" style="margin-bottom: 0;">
                <button class="layui-btn layui-btn-normal" id="btn-convert" style="height: 44px; line-height: 44px; margin-left: 10px;"><i class="layui-icon layui-icon-theme"></i> 转换一下</button>
            </div>
        </div>

        <hr>

        <div class="layui-form-item">
            <label class="layui-form-label">HEX</label>
            <div class="layui-input-block">
                <input type="text" id="res-hex" class="layui-input code-box" readonly style="border: 1px solid #e2e8f0; padding: 0 15px; height: 44px; line-height: 44px;">
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">RGB</label>
            <div class="layui-input-block">
                <input type="text" id="res-rgb" class="layui-input code-box" readonly style="border: 1px solid #e2e8f0; padding: 0 15px; height: 44px; line-height: 44px;">
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">RGBA</label>
            <div class="layui-input-block">
                <input type="text" id="res-rgba" class="layui-input code-box" readonly style="border: 1px solid #e2e8f0; padding: 0 15px; height: 44px; line-height: 44px;">
            </div>
        </div>

    </div>
</div>
{/block}

{block name="script"}
<script>
layui.use(['layer', 'jquery'], function(){
    var layer = layui.layer, $ = layui.jquery;

    function hexToRgb(hex) {
        var result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
        return result ? {
            r: parseInt(result[1], 16),
            g: parseInt(result[2], 16),
            b: parseInt(result[3], 16)
        } : null;
    }

    function rgbToHex(r, g, b) {
        return "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
    }

    $('#btn-convert').click(function(){
        var val = $('#color-input').val().trim();
        if(!val) return;
        processColor(val);
    });

    // 颜色选择器交互
    $('#color-preview').click(function() {
        $('#color-picker').click();
    });

    $('#color-picker').on('input change', function() {
        var color = $(this).val();
        $('#color-input').val(color);
        processColor(color);
    });

    function processColor(val) {
        $('#color-preview').css('background-color', val);

        // Check if HEX
        if(val.indexOf('#') === 0 && (val.length === 4 || val.length === 7)) {
            // Expand shorthand form (e.g. "03F") to full form (e.g. "0033FF")
            var hex = val;
            if(val.length === 4) {
                 var shorthandRegex = /^#?([a-f\d])([a-f\d])([a-f\d])$/i;
                 hex = val.replace(shorthandRegex, function(m, r, g, b) {
                    return r + r + g + g + b + b;
                });
            }
            
            var rgb = hexToRgb(hex);
            if(rgb) {
                $('#res-hex').val(hex.toLowerCase());
                $('#res-rgb').val('rgb(' + rgb.r + ', ' + rgb.g + ', ' + rgb.b + ')');
                $('#res-rgba').val('rgba(' + rgb.r + ', ' + rgb.g + ', ' + rgb.b + ', 1)');
            } else {
                layer.msg('HEX 格式不正确');
            }
        } 
        // Check if RGB
        else if(val.toLowerCase().indexOf('rgb') === 0) {
            var parts = val.match(/\d+/g);
            if(parts && parts.length >= 3) {
                var r = parseInt(parts[0]);
                var g = parseInt(parts[1]);
                var b = parseInt(parts[2]);
                var hex = rgbToHex(r, g, b);
                $('#res-hex').val(hex);
                $('#res-rgb').val('rgb(' + r + ', ' + g + ', ' + b + ')');
                $('#res-rgba').val('rgba(' + r + ', ' + g + ', ' + b + ', 1)');
            } else {
                layer.msg('RGB 格式不正确');
            }
        }
        else {
            layer.msg('无法识别的颜色格式');
        }
    }
});
</script>
{/block}
