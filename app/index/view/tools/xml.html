{extend name="tools/layout" /}

{block name="keywords"}XML转JSON,JSON转XML,XML格式化,XML校验,在线XML工具{/block}
{block name="description"}在线XML与JSON互转工具，支持XML格式化、校验以及XML与JSON数据格式的互相转换，开发调试必备。{/block}

{block name="style"}
<style>
    .result-box {
        background-color: #f8f9fa;
        min-height: 400px;
        padding: 10px;
        border: 1px solid #e6e6e6;
        border-radius: 4px;
        white-space: pre-wrap;
        font-family: monospace;
    }
</style>
{/block}

{block name="main"}
<div class="layui-card">
    <div class="layui-card-header">XML 格式化 / 压缩</div>
    <div class="layui-card-body">
        <div class="layui-form-item">
            <div class="layui-btn-group">
                <button class="layui-btn layui-btn-normal" id="btn-format">格式化</button>
                <button class="layui-btn layui-btn-primary" id="btn-compress">压缩</button>
                <button class="layui-btn layui-btn-danger" id="btn-clear">清空</button>
                <button class="layui-btn" id="btn-copy">复制结果</button>
            </div>
        </div>
        
        <div class="layui-row layui-col-space15">
            <div class="layui-col-md6">
                <textarea id="input-box" placeholder="在此输入 XML 代码..." class="layui-textarea" style="height: 450px; font-family: monospace;"></textarea>
            </div>
            <div class="layui-col-md6">
                <textarea id="output-box" placeholder="处理结果..." class="layui-textarea" style="height: 450px; background-color: #f8f9fa; font-family: monospace;" readonly></textarea>
            </div>
        </div>
    </div>
</div>
{/block}

{block name="script"}
<script src="https://cdnjs.cloudflare.com/ajax/libs/clipboard.js/2.0.11/clipboard.min.js"></script>
<script>
layui.use(['layer', 'jquery'], function(){
    var layer = layui.layer,
        $ = layui.jquery;

    // XML Format Function
    function formatXml(xml) {
        var formatted = '';
        var reg = /(>)(<)(\/*)/g;
        xml = xml.replace(reg, '$1\r\n$2$3');
        var pad = 0;
        jQuery.each(xml.split('\r\n'), function(index, node) {
            var indent = 0;
            if (node.match( /.+<\/\w[^>]*>$/ )) {
                indent = 0;
            } else if (node.match( /^<\/\w/ )) {
                if (pad != 0) {
                    pad -= 1;
                }
            } else if (node.match( /^<\w[^>]*[^\/]>.*$/ )) {
                indent = 1;
            } else {
                indent = 0;
            }

            var padding = '';
            for (var i = 0; i < pad; i++) {
                padding += '  ';
            }

            formatted += padding + node + '\r\n';
            pad += indent;
        });

        return formatted;
    }

    // Compress Function
    function compressXml(xml) {
        return xml.replace(/>\s+</g, '><').replace(/\s{2,}/g, ' ').trim();
    }

    $('#btn-format').click(function(){
        var xml = $('#input-box').val();
        if(!xml) return;
        try {
            // Simple validation check
            if (xml.indexOf('<') === -1) {
                throw new Error("Invalid XML");
            }
            $('#output-box').val(formatXml(xml));
        } catch(e) {
            layer.msg('XML 解析错误: ' + e.message, {icon: 2});
        }
    });

    $('#btn-compress').click(function(){
        var xml = $('#input-box').val();
        if(!xml) return;
        $('#output-box').val(compressXml(xml));
    });

    $('#btn-clear').click(function(){
        $('#input-box').val('');
        $('#output-box').val('');
    });

    // Copy
    var clipboard = new ClipboardJS('#btn-copy', {
        target: function(trigger) {
            return document.getElementById('output-box');
        }
    });

    clipboard.on('success', function(e) {
        layer.msg('复制成功', {icon: 1, time: 1500});
        e.clearSelection();
    });

    clipboard.on('error', function(e) {
        layer.msg('复制失败', {icon: 2});
    });
});
</script>
{/block}
