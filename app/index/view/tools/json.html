{extend name="tools/layout" /}

{block name="keywords"}JSON格式化,JSON校验,JSON美化,JSON压缩,在线JSON工具{/block}
{block name="description"}在线JSON格式化与校验工具，支持JSON美化、压缩、错误检查，提供语法高亮显示，是开发调试JSON数据的利器。{/block}

{block name="style"}{/block}

{block name="main"}
<div class="layui-card">
    <div class="layui-card-header">JSON 格式化 / 校验 / 压缩</div>
    <div class="layui-card-body">
        <div class="layui-form-item">
            <div class="layui-btn-group">
                <button class="layui-btn layui-btn-normal" id="btn-format">格式化</button>
                <button class="layui-btn layui-btn-primary" id="btn-compress">压缩</button>
                <button class="layui-btn layui-btn-primary" id="btn-escape">转义</button>
                <button class="layui-btn layui-btn-primary" id="btn-unescape">去转义</button>
                <button class="layui-btn layui-btn-danger" id="btn-clear">清空</button>
            </div>
            <span class="error-msg" id="msg-box"></span>
        </div>
        
        <div class="layui-row layui-col-space15">
            <div class="layui-col-md6">
                <textarea class="layui-textarea code-textarea" id="json-src" placeholder="在此输入 JSON 字符串..."></textarea>
            </div>
            <div class="layui-col-md6">
                <textarea class="layui-textarea code-textarea" id="json-target" placeholder="处理结果..." readonly></textarea>
            </div>
        </div>
    </div>
</div>
{/block}

{block name="script"}
<script>
layui.use(['layer', 'jquery'], function(){
    var layer = layui.layer, $ = layui.jquery;

    function getSource() {
        return $('#json-src').val().trim();
    }

    function setTarget(val) {
        $('#json-target').val(val);
    }

    function showMsg(msg, isError) {
        var $box = $('#msg-box');
        $box.text(msg).css('color', isError ? '#FF5722' : '#009688').show();
        setTimeout(function(){ $box.fadeOut(); }, 3000);
    }

    $('#btn-format').click(function(){
        var src = getSource();
        if (!src) return;
        try {
            var obj = JSON.parse(src);
            setTarget(JSON.stringify(obj, null, 4));
            showMsg('格式化成功', false);
        } catch (e) {
            showMsg('JSON 格式错误: ' + e.message, true);
        }
    });

    $('#btn-compress').click(function(){
        var src = getSource();
        if (!src) return;
        try {
            var obj = JSON.parse(src);
            setTarget(JSON.stringify(obj));
            showMsg('压缩成功', false);
        } catch (e) {
            showMsg('JSON 格式错误: ' + e.message, true);
        }
    });

    $('#btn-escape').click(function(){
        var src = getSource();
        if (!src) return;
        setTarget(src.replace(/\\/g, "\\\\").replace(/"/g, "\\\""));
        showMsg('转义成功', false);
    });

    $('#btn-unescape').click(function(){
        var src = getSource();
        if (!src) return;
        setTarget(src.replace(/\\"/g, '"').replace(/\\\\/g, "\\"));
        showMsg('去转义成功', false);
    });

    $('#btn-clear').click(function(){
        $('#json-src').val('');
        $('#json-target').val('');
        $('#msg-box').hide();
    });
});
</script>
{/block}
