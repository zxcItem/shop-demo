{extend name="tools/layout" /}

{block name="keywords"}二维码生成,在线二维码,URL转二维码,文本转二维码,带Logo二维码,彩色二维码{/block}
{block name="description"}专业免费的在线二维码生成工具，支持将文本、网址等内容生成二维码，支持自定义颜色、大小、圆角，并提供一键下载功能。{/block}

{block name="main"}
<div class="layui-card">
    <div class="layui-card-header">二维码生成</div>
    <div class="layui-card-body">
        
        <div class="layui-row layui-col-space30">
            <!-- 左侧设置区域 -->
            <div class="layui-col-md7">
                <div class="layui-form">
                    <div class="layui-form-item layui-form-text">
                        <label class="layui-form-label" style="text-align:left; padding-left:0;">文本 / 链接内容</label>
                        <div class="layui-input-block" style="margin-left:0;">
                            <textarea id="input-box" class="layui-textarea" placeholder="在此输入需要转换成二维码的内容..." style="height: 120px; font-family: 'Inter', sans-serif;"></textarea>
                        </div>
                    </div>
                    
                    <div class="layui-form-item">
                        <div class="layui-inline" style="width: 48%; margin-right: 2%;">
                            <label class="layui-form-label" style="padding-left:0;">前景色 (线条)</label>
                            <div class="layui-input-block" style="margin-left:0; display: flex;">
                                <input type="color" id="qr-color-dark" value="#0f172a" style="width: 44px; height: 44px; padding: 0; border: 1px solid #e2e8f0; border-radius: 8px; cursor: pointer; margin-right: 10px;">
                                <input type="text" id="qr-color-dark-text" value="#0f172a" class="layui-input" readonly style="background: #f8fafc;">
                            </div>
                        </div>
                        <div class="layui-inline" style="width: 48%; margin-right: 0;">
                            <label class="layui-form-label" style="padding-left:0;">背景色</label>
                            <div class="layui-input-block" style="margin-left:0; display: flex;">
                                <input type="color" id="qr-color-light" value="#ffffff" style="width: 44px; height: 44px; padding: 0; border: 1px solid #e2e8f0; border-radius: 8px; cursor: pointer; margin-right: 10px;">
                                <input type="text" id="qr-color-light-text" value="#ffffff" class="layui-input" readonly style="background: #f8fafc;">
                            </div>
                        </div>
                    </div>
                    
                    <div class="layui-form-item" style="margin-top: 35px;">
                        <button class="layui-btn layui-btn-normal" id="btn-gen" style="width: 100%; height: 50px; font-size: 16px;"><i class="layui-icon layui-icon-release"></i> 立即生成二维码</button>
                    </div>
                </div>
            </div>
            
            <!-- 右侧预览区域 -->
            <div class="layui-col-md5" style="text-align: center;">
                <label class="layui-form-label" style="width: 100%; text-align: left; padding: 0 0 10px 0; display: block;">实时预览</label>
                <div style="background: #f8fafc; border: 1px dashed #cbd5e1; border-radius: 16px; padding: 30px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 260px;">
                    <div id="qrcode-area">
                        <div style="color: #94a3b8; font-size: 15px; margin-top: 50px; margin-bottom: 50px;">
                            <i class="layui-icon layui-icon-picture" style="font-size: 48px; opacity: 0.5;"></i><br>
                            等待生成...
                        </div>
                    </div>
                    
                    <button class="layui-btn layui-btn-warm" id="btn-download" style="margin-top: 25px; display: none; width: 200px; border-radius: 50px;"><i class="layui-icon layui-icon-download-circle"></i> 下载保存图片</button>
                </div>
            </div>
        </div>

    </div>
</div>
{/block}

{block name="script"}
<script src="https://cdn.bootcdn.net/ajax/libs/jquery.qrcode/1.0/jquery.qrcode.min.js"></script>
<script>
layui.use(['layer', 'jquery'], function(){
    var layer = layui.layer, $ = layui.jquery;
    
    // 同步颜色显示
    $('#qr-color-dark').on('input', function() { $('#qr-color-dark-text').val($(this).val()); });
    $('#qr-color-light').on('input', function() { $('#qr-color-light-text').val($(this).val()); });

    function toUtf8(str) {    
        var out, i, len, c;    
        out = "";    
        len = str.length;    
        for(i = 0; i < len; i++) {    
            c = str.charCodeAt(i);    
            if ((c >= 0x0001) && (c <= 0x007F)) {    
                out += str.charAt(i);    
            } else if (c > 0x07FF) {    
                out += String.fromCharCode(0xE0 | ((c >> 12) & 0x0F));    
                out += String.fromCharCode(0x80 | ((c >>  6) & 0x3F));    
                out += String.fromCharCode(0x80 | ((c >>  0) & 0x3F));    
            } else {    
                out += String.fromCharCode(0xC0 | ((c >>  6) & 0x1F));    
                out += String.fromCharCode(0x80 | ((c >>  0) & 0x3F));    
            }    
        }    
        return out;    
    } 

    $('#btn-gen').click(function(){
        var txt = $('#input-box').val(); 
        if(!txt) { 
            layer.msg('请输入需要转换的内容', {icon: 0, shift: 6}); 
            $('#input-box').focus();
            return; 
        }

        var colorDark = $('#qr-color-dark').val();
        var colorLight = $('#qr-color-light').val();

        $('#qrcode-area').empty();

        // 使用 Canvas 渲染，方便后续下载
        $('#qrcode-area').qrcode({
            render: "canvas", 
            text: toUtf8(txt),
            width: 240,
            height: 240,
            foreground: colorDark,
            background: colorLight
        });
        
        // 显示下载按钮
        $('#btn-download').fadeIn();
        layer.msg('生成成功', {icon: 1, time: 1000});
    });
    
    // 下载功能
    $('#btn-download').click(function(){
        var canvas = $('#qrcode-area canvas').get(0);
        if(!canvas) return;
        
        var url = canvas.toDataURL('image/png');
        var a = document.createElement('a');
        a.href = url;
        a.download = 'qrcode_' + new Date().getTime() + '.png';
        a.click();
    });
});
</script>
{/block}
