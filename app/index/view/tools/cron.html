{extend name="tools/layout" /}

{block name="main"}
<div class="layui-card">
    <div class="layui-card-header">Cron 表达式生成 / 解析</div>
    <div class="layui-card-body">
        
        <div class="layui-form-item">
            <label class="layui-form-label" style="width: auto;">Cron 表达式</label>
            <div class="layui-input-inline" style="width: 300px;">
                <input type="text" id="cron-input" value="* * * * *" placeholder="* * * * *" class="layui-input">
            </div>
            <div class="layui-inline">
                <button class="layui-btn" id="btn-parse">解析说明</button>
            </div>
        </div>

        <div class="layui-form-item">
            <div class="layui-input-block" style="margin-left: 0;">
                <div id="cron-desc" style="padding: 15px; background: #f0f9eb; border: 1px solid #e1f3d8; color: #67c23a; border-radius: 4px; display: none;"></div>
            </div>
        </div>

        <fieldset class="layui-elem-field layui-field-title" style="margin-top: 30px;">
             <legend>常用例子</legend>
        </fieldset>
        
        <table class="layui-table" lay-skin="line">
            <colgroup>
                <col width="200">
                <col>
                <col width="100">
            </colgroup>
            <thead>
                <tr>
                    <th>表达式</th>
                    <th>说明</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>*/5 * * * *</td>
                    <td>每 5 分钟执行一次</td>
                    <td><button class="layui-btn layui-btn-xs btn-use">使用</button></td>
                </tr>
                <tr>
                    <td>0 * * * *</td>
                    <td>每小时执行一次 (整点)</td>
                    <td><button class="layui-btn layui-btn-xs btn-use">使用</button></td>
                </tr>
                <tr>
                    <td>0 0 * * *</td>
                    <td>每天 0 点执行一次</td>
                    <td><button class="layui-btn layui-btn-xs btn-use">使用</button></td>
                </tr>
                <tr>
                    <td>0 0 * * 0</td>
                    <td>每周日 0 点执行一次</td>
                    <td><button class="layui-btn layui-btn-xs btn-use">使用</button></td>
                </tr>
                 <tr>
                    <td>0 0 1 * *</td>
                    <td>每月 1 号 0 点执行一次</td>
                    <td><button class="layui-btn layui-btn-xs btn-use">使用</button></td>
                </tr>
            </tbody>
        </table>

    </div>
</div>
{/block}

{block name="script"}
<script src="https://cdn.jsdelivr.net/npm/cronstrue@latest/dist/cronstrue.min.js"></script>
<script>
layui.use(['layer', 'jquery'], function(){
    var layer = layui.layer, $ = layui.jquery;

    function parseCron() {
        var cron = $('#cron-input').val().trim();
        if(!cron) return;

        try {
            var desc = cronstrue.toString(cron, { locale: "zh_CN" });
            $('#cron-desc').text(desc).show();
        } catch(e) {
            $('#cron-desc').text("Cron 表达式无效: " + e).css('color', 'red').css('background', '#fef0f0').css('border-color', '#fde2e2').show();
        }
    }

    $('#btn-parse').click(parseCron);

    $('.btn-use').click(function(){
        var cron = $(this).closest('tr').find('td:eq(0)').text();
        $('#cron-input').val(cron);
        parseCron();
    });
});
</script>
{/block}
