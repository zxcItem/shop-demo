{extend name="tools/layout" /}

{block name="main"}
<div class="layui-card">
    <div class="layui-card-header">文本差异对比 (Diff)</div>
    <div class="layui-card-body">
        
        <div class="layui-row layui-col-space15">
            <div class="layui-col-md6">
                <div class="layui-form-item layui-form-text">
                    <label class="layui-form-label" style="text-align:left; padding-left:0;">旧文本 (Original)</label>
                    <div class="layui-input-block" style="margin-left:0;">
                        <textarea id="text-old" class="layui-textarea" style="height: 200px;" placeholder="在此输入旧版本文本..."></textarea>
                    </div>
                </div>
            </div>
            <div class="layui-col-md6">
                <div class="layui-form-item layui-form-text">
                    <label class="layui-form-label" style="text-align:left; padding-left:0;">新文本 (New)</label>
                    <div class="layui-input-block" style="margin-left:0;">
                        <textarea id="text-new" class="layui-textarea" style="height: 200px;" placeholder="在此输入新版本文本..."></textarea>
                    </div>
                </div>
            </div>
        </div>

        <div class="layui-form-item" style="text-align:center;">
            <button class="layui-btn" id="btn-diff">开始对比</button>
            <button class="layui-btn layui-btn-primary" id="btn-clear">清空</button>
        </div>

        <div class="layui-form-item layui-form-text">
            <label class="layui-form-label" style="text-align:left; padding-left:0;">对比结果</label>
            <div class="layui-input-block" style="margin-left:0;">
                <div id="diff-output" style="min-height: 200px; padding: 15px; border: 1px solid #e6e6e6; background: #fff; border-radius: 4px; font-family: monospace; white-space: pre-wrap; line-height: 1.6;"></div>
            </div>
        </div>

    </div>
</div>
{/block}

{block name="script"}
<script src="https://cdn.bootcdn.net/ajax/libs/diff_match_patch/20121119/diff_match_patch.js"></script>
<script>
layui.use(['layer', 'jquery'], function(){
    var layer = layui.layer, $ = layui.jquery;

    $('#btn-diff').click(function(){
        var text1 = $('#text-old').val();
        var text2 = $('#text-new').val();
        
        if(!text1 && !text2) {
             layer.msg('请输入要对比的文本');
             return;
        }

        var dmp = new diff_match_patch();
        var diffs = dmp.diff_main(text1, text2);
        dmp.diff_cleanupSemantic(diffs);
        
        var html = dmp.diff_prettyHtml(diffs);
        $('#diff-output').html(html);
    });

    $('#btn-clear').click(function(){
        $('#text-old').val('');
        $('#text-new').val('');
        $('#diff-output').empty();
    });
});
</script>
{/block}
