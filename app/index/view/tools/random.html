{extend name="tools/layout" /}

{block name="keywords"}随机密码生成,随机密码生成器,UUID生成,强密码生成,密码安全管理{/block}
{block name="description"}专业免费的在线随机密码与UUID生成工具。支持自定义密码长度、包含大小写字母、数字和符号，排除易混淆字符以生成不可预测的安全强密码。{/block}

{block name="main"}
<div class="layui-card">
    <div class="layui-card-header">随机强密码 / UUID 生成</div>
    <div class="layui-card-body">
        <div class="layui-row layui-col-space30">
            <!-- 配置区域 -->
            <div class="layui-col-md6">
                <form class="layui-form" lay-filter="pwd-form" style="background: #f8fafc; padding: 25px; border-radius: 12px; border: 1px solid #e2e8f0;">
                    
                    <div style="font-weight: 700; color: #334155; margin-bottom: 20px; font-size: 16px;">
                        <i class="layui-icon layui-icon-set-fill" style="color: #6366f1;"></i> 密码强度配置
                    </div>

                    <div class="layui-form-item" style="margin-bottom: 15px;">
                        <label class="layui-form-label" style="width: auto; padding-left: 0; padding-right: 20px;">生成长度 <span id="pwd-len-val" style="color: #6366f1; font-weight: bold;">16</span> 位</label>
                        <div class="layui-input-block" style="margin-left: 0;">
                            <input type="range" id="pwd-len" value="16" min="4" max="64" style="width: 100%; cursor: pointer;" oninput="document.getElementById('pwd-len-val').innerText = this.value">
                        </div>
                    </div>

                    <div class="layui-form-item" style="margin-bottom: 10px;">
                        <label class="layui-form-label" style="width: auto; padding-left: 0; padding-right: 20px;">生成数量 <span id="pwd-cnt-val" style="color: #6366f1; font-weight: bold;">5</span> 个</label>
                        <div class="layui-input-block" style="margin-left: 0;">
                            <input type="range" id="pwd-count" value="5" min="1" max="50" style="width: 100%; cursor: pointer;" oninput="document.getElementById('pwd-cnt-val').innerText = this.value">
                        </div>
                    </div>

                    <hr style="background-color: #cbd5e1; margin: 20px 0;">

                    <div class="layui-form-item" style="margin-bottom: 5px;">
                        <div class="layui-input-block" style="margin-left: 0;">
                            <input type="checkbox" id="use_low" title="小写字母 (a-z)" lay-skin="primary" checked>
                        </div>
                    </div>
                    <div class="layui-form-item" style="margin-bottom: 5px;">
                        <div class="layui-input-block" style="margin-left: 0;">
                            <input type="checkbox" id="use_up" title="大写字母 (A-Z)" lay-skin="primary" checked>
                        </div>
                    </div>
                    <div class="layui-form-item" style="margin-bottom: 5px;">
                        <div class="layui-input-block" style="margin-left: 0;">
                            <input type="checkbox" id="use_num" title="阿拉伯数字 (0-9)" lay-skin="primary" checked>
                        </div>
                    </div>
                    <div class="layui-form-item" style="margin-bottom: 5px;">
                        <div class="layui-input-block" style="margin-left: 0;">
                            <input type="checkbox" id="use_spec" title="特殊符号 (!@#$%)" lay-skin="primary" checked>
                        </div>
                    </div>
                    
                    <div class="layui-form-item" style="margin-bottom: 0; margin-top: 15px;">
                        <div class="layui-input-block" style="margin-left: 0;">
                            <input type="checkbox" id="use_exclude" title="排除易混淆的字符 (i, l, 1, L, o, 0, O)" lay-skin="primary" checked>
                        </div>
                    </div>
                </form>

                <div class="layui-form-item" style="margin-top: 25px; display: flex; gap: 15px;">
                    <button class="layui-btn layui-btn-normal" id="btn-gen-pwd" style="flex: 2; height: 50px; font-size: 16px;"><i class="layui-icon layui-icon-password"></i> 批量生成密码</button>
                    <button class="layui-btn layui-btn-warm" id="btn-gen-uuid" style="flex: 1; height: 50px; font-size: 16px;"><i class="layui-icon layui-icon-util"></i> 生成 UUID</button>
                </div>
            </div>

            <!-- 结果区域 -->
            <div class="layui-col-md6">
                <div style="font-weight: 700; color: #334155; margin-bottom: 12px; font-size: 16px; display: flex; justify-content: space-between; align-items: center;">
                    <div><i class="layui-icon layui-icon-form" style="color: #6366f1;"></i> 生成结果</div>
                    <button class="layui-btn layui-btn-primary layui-btn-sm" id="btn-copy"><i class="layui-icon layui-icon-file"></i> 一键复制全部</button>
                </div>
                <textarea id="output-box" class="layui-textarea" placeholder="点击左侧按钮生成密码..." readonly style="height: 480px; font-family: 'JetBrains Mono', Consolas, monospace; font-size: 16px; line-height: 1.8; background: #fff; padding: 20px;"></textarea>
            </div>
        </div>
    </div>
</div>
{/block}

{block name="script"}
<script src="https://cdnjs.cloudflare.com/ajax/libs/clipboard.js/2.0.11/clipboard.min.js"></script>
<script>
layui.use(['layer', 'jquery', 'form'], function(){
    var layer = layui.layer, $ = layui.jquery, form = layui.form;

    function getRandomChar(str) {
        return str.charAt(Math.floor(Math.random() * str.length));
    }

    $('#btn-gen-pwd').click(function(){
        var useNum = $('#use_num').prop('checked');
        var useLow = $('#use_low').prop('checked');
        var useUp  = $('#use_up').prop('checked');
        var useSpec = $('#use_spec').prop('checked');
        var excludeAmb = $('#use_exclude').prop('checked');
        
        if(!useNum && !useLow && !useUp && !useSpec) {
            layer.msg('请至少选择一种字符类型', {icon: 0, anim: 6});
            return;
        }

        var strNum = "0123456789";
        var strLow = "abcdefghijklmnopqrstuvwxyz";
        var strUp = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        var strSpec = "!@#$%^&*()_+-=[]{}|;:,.<>?";

        if (excludeAmb) {
            // Exclude i, l, 1, L, o, 0, O
            strNum = strNum.replace(/[01]/g, '');
            strLow = strLow.replace(/[ilo]/g, '');
            strUp = strUp.replace(/[IO]/g, ''); // 'L' is sometimes kept but we can remove it
            strUp = strUp.replace(/[L]/g, '');
        }

        var chars = "";
        if(useNum) chars += strNum;
        if(useLow) chars += strLow;
        if(useUp) chars += strUp;
        if(useSpec) chars += strSpec;

        if (chars.length === 0) {
            layer.msg('选择条件过于苛刻，无可用的字符');
            return;
        }

        var len = parseInt($('#pwd-len').val()) || 16;
        var count = parseInt($('#pwd-count').val()) || 5;
        var result = [];

        for(var k=0; k<count; k++) {
            var pwd = "";
            for(var i=0; i<len; i++) {
                pwd += getRandomChar(chars);
            }
            result.push(pwd);
        }

        $('#output-box').fadeOut(100, function() {
            $(this).val(result.join("\n")).fadeIn(200);
        });
        layer.msg('密码已生成，点击右侧可一键复制', {icon: 1});
    });

    $('#btn-gen-uuid').click(function(){
        var count = parseInt($('#pwd-count').val()) || 5;
        var result = [];
        for(var k=0; k<count; k++) {
            var d = new Date().getTime();
            var uuid = 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                var r = (d + Math.random()*16)%16 | 0;
                d = Math.floor(d/16);
                return (c=='x' ? r : (r&0x3|0x8)).toString(16);
            });
            result.push(uuid);
        }
        $('#output-box').fadeOut(100, function() {
            $(this).val(result.join("\n")).fadeIn(200);
        });
        layer.msg('UUID 已生成', {icon: 1});
    });

    var clipboard = new ClipboardJS('#btn-copy', {
        target: function() { return document.getElementById('output-box'); }
    });
    clipboard.on('success', function(e) { 
        if(!e.text) { layer.msg('没有任何内容可复制'); return; }
        layer.msg('全部复制成功！', {icon: 1, time: 2000}); 
        e.clearSelection(); 
    });

    // 默认生成一次
    setTimeout(function(){ $('#btn-gen-pwd').click(); }, 300);
});
</script>
{/block}
