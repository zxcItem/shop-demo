{extend name="main"}

{block name="content"}
{include file='marketing/sidebar'}

<div class="layui-card think-box-shadow animate-in-up">
    <div class="layui-card-header ta-pl-30 ta-pt-20 ta-pb-10" style="height: auto; line-height: 1.2;">
        <span class="layui-font-18 font-w7 color-blue">优惠券营销规则</span>
        <p class="ta-mt-5 color-desc">配置全店通用的优惠券规则，提升用户下单转化率</p>
    </div>
    
    <div class="layui-card-body ta-p-30">
        <form action="{:sysuri()}" method="post" data-auto="true" class="layui-form">
            
            <!-- 基础开关 -->
            <div class="layui-form-item">
                <label class="layui-form-label font-w7">启用营销</label>
                <div class="layui-input-block">
                    {foreach ['1'=>'开启营销活动','0'=>'关闭营销活动'] as $k=>$v}
                    <input type="radio" name="status" value="{$k}" title="{$v}" {if $data.status eq $k}checked{/if}>
                    {/foreach}
                    <div class="help-block ta-mt-10">
                        <i class="layui-icon layui-icon-tips color-orange ta-mr-5"></i>
                        全局总开关。关闭后，已发放的优惠券将无法使用，用户也无法领取新券。
                    </div>
                </div>
            </div>

            <div class="hr-line-dashed"></div>

            <!-- 参数设置 -->

            <div class="layui-form-item ta-mt-20">
                <label class="layui-form-label font-w7">使用说明</label>
                <div class="layui-input-block">
                    <textarea name="description" class="layui-textarea" style="min-height: 150px; line-height: 1.6;" placeholder="请输入优惠券通用说明...">{$data.description|default=''}</textarea>
                    <p class="help-block">此内容将展示在领券中心、商品详情页及用户个人券包的详情说明中。</p>
                </div>
            </div>

            <div class="hr-line-dashed ta-mt-30"></div>
            
            <div class="layui-form-item ta-pl-110">
                <button class="layui-btn layui-btn-normal ta-pr-30 ta-pl-30" type="submit">
                    <i class="layui-icon layui-icon-ok ta-mr-5"></i> 保存配置
                </button>
                <button class="layui-btn layui-btn-primary" type="reset">重置表单</button>
            </div>
        </form>
    </div>
</div>

<style>
    .animate-in-up { animation: fadeInUp 0.5s ease-out both; }
    @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .ta-pl-110 { padding-left: 110px; }
    .color-blue { color: #1e9fff !important; }
</style>
{/block}
