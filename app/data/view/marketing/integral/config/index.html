{extend name="main"}

{block name="content"}
{include file='marketing/sidebar'}

<div class="layui-card think-box-shadow animate-in-up">
    <div class="layui-card-header ta-pl-30 ta-pt-20 ta-pb-10" style="height: auto; line-height: 1.2;">
        <span class="layui-font-18 font-w7 color-blue">积分商城基础设置</span>
        <p class="ta-mt-5 color-desc">配置商城入口信息，提升用户参与积分兑换的积极性</p>
    </div>
    
    <div class="layui-card-body ta-p-30">
        <form action="{:sysuri()}" method="post" data-auto="true" class="layui-form">
            
            <div class="layui-form-item">
                <label class="layui-form-label font-w7">商城开关</label>
                <div class="layui-input-block">
                    {foreach ['1'=>'开启商城','0'=>'关闭商城'] as $k=>$v}
                    <input type="radio" name="status" value="{$k}" title="{$v}" {if $data.status eq $k}checked{/if}>
                    {/foreach}
                    <p class="help-block">总开关。关闭后，用户端将无法进入积分商城频道。</p>
                </div>
            </div>

            <div class="hr-line-dashed"></div>

            <div class="layui-form-item">
                <label class="layui-form-label font-w7">商城名称</label>
                <div class="layui-input-block" style="max-width: 400px;">
                    <input type="text" name="name" value="{$data.name|default='积分商城'}" required class="layui-input">
                    <p class="help-block">展示在用户端的商城名称（如：好物换购、积分乐园）。</p>
                </div>
            </div>

            <div class="layui-form-item ta-mt-20">
                <label class="layui-form-label font-w7">宣传语</label>
                <div class="layui-input-block">
                    <textarea name="remark" class="layui-textarea" style="min-height: 80px;">{$data.remark|default=''}</textarea>
                    <p class="help-block">展示在商城首页 Banner 下方的介绍文字。</p>
                </div>
            </div>

            <div class="hr-line-dashed ta-mt-30"></div>
            
            <div class="layui-form-item ta-pl-110">
                <button class="layui-btn layui-btn-normal ta-pr-30 ta-pl-30" type="submit">
                    <i class="layui-icon layui-icon-ok ta-mr-5"></i> 保存配置
                </button>
            </div>
        </form>
    </div>
</div>

<!-- 必须闭合 sidebar.html 中的 sub-main-content 和 sub-sidebar-container -->
</div>
</div>

<style>
    .animate-in-up { animation: fadeInUp 0.5s ease-out both; }
    @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .ta-pl-110 { padding-left: 110px; }
    .color-blue { color: #1e9fff !important; }
</style>
{/block}
