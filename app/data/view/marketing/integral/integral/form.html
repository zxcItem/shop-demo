<form action="{:sysuri()}" method="post" data-auto="true" class="layui-form layui-card">
    <div class="layui-card-body ta-p-30">
        <div class="layui-form-item">
            <label class="layui-form-label font-w7">关联商品</label>
            <div class="layui-input-block">
                <input name="goods_id" value='{$vo.goods_id|default=""}' required placeholder="请输入商品ID" class="layui-input">
                <p class="help-block">请输入商品 SPU ID。</p>
            </div>
        </div>

        <div class="layui-form-item">
            <label class="layui-form-label font-w7">商品规格</label>
            <div class="layui-input-block">
                <input name="ghash" value='{$vo.ghash|default=""}' required placeholder="请输入规格哈希 (ghash)" class="layui-input">
                <input name="goods_spec" value='{$vo.goods_spec|default=""}' placeholder="规格描述（可选）" class="layui-input ta-mt-5">
                <p class="help-block">多规格商品请填写具体的规格哈希，以区分定价。</p>
            </div>
        </div>

        <div class="layui-form-item">
            <label class="layui-form-label font-w7">兑换积分</label>
            <div class="layui-input-block">
                <input type="number" name="integral_price" value='{$vo.integral_price|default="0"}' required min="0" placeholder="请输入所需积分" class="layui-input">
                <p class="help-block">兑换该商品所需的基础积分。</p>
            </div>
        </div>

        <div class="layui-form-item">
            <label class="layui-form-label font-w7">补差金额</label>
            <div class="layui-input-block">
                <input type="number" name="cash_price" value='{$vo.cash_price|default="0.00"}' step="0.01" min="0" placeholder="请输入补差金额" class="layui-input">
                <p class="help-block">可选，用户除积分外需要支付的现金金额。</p>
            </div>
        </div>

        <div class="layui-form-item">
            <label class="layui-form-label font-w7">活动库存</label>
            <div class="layui-input-block">
                <input type="number" name="total_stock" value='{$vo.total_stock|default="0"}' required min="0" placeholder="请输入活动库存" class="layui-input">
                <p class="help-block">分配给积分商城的独立库存，不占用普通销售库存。</p>
            </div>
        </div>

        <div class="layui-form-item">
            <label class="layui-form-label font-w7">每人限兑</label>
            <div class="layui-input-block">
                <input type="number" name="limit_num" value='{$vo.limit_num|default="0"}' required min="0" placeholder="请输入限兑数量" class="layui-input">
                <p class="help-block">0表示不限制。设置每个用户累计可兑换的最大次数。</p>
            </div>
        </div>

        <div class="hr-line-dashed"></div>
        {if isset($vo.id)}<input type='hidden' value='{$vo.id}' name='id'>{/if}

        <div class="layui-form-item text-center">
            <button class="layui-btn" type='submit'>保存数据</button>
            <button class="layui-btn layui-btn-danger" type='button' data-confirm="确定要取消编辑吗？" data-close>取消编辑</button>
        </div>
    </div>
</form>
