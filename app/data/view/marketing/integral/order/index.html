{extend name="table"}

{block name="content"}
{include file='marketing/sidebar'}
<div class="think-box-shadow">
    <table id="IntegralOrderTable" data-url="{:request()->url()}" data-target-search="form.form-search"></table>
</div>
{/block}

{block name='script'}
<script>
    $(function () {
        $('#IntegralOrderTable').layTable({
            even: true, height: 'full',
            sort: { field: 'id', type: 'desc' },
            cols: [[
                {field: 'id', title: 'ID', align: 'center', width: 80},
                {field: 'user_nickname', title: '会员用户', minWidth: 150},
                {field: 'goods_name', title: '兑换商品', minWidth: 200},
                {
                    title: '消耗明细', minWidth: 150, templet: function (d) {
                        return '<span class="color-blue">' + d.used_integral + '</span> 积分 + <span class="color-red">' + d.used_cash + '</span> 元';
                    }
                },
                {field: 'create_time', title: '兑换时间', align: 'center', width: 170, sort: true},
                {field: 'status_name', title: '状态', align: 'center', width: 100},
            ]]
        });
    });
</script>
{/block}
